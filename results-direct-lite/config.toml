version = 2
root = "/var/lib/containerd"
state = "/run/containerd"
oom_score = 0

[grpc]
  address = "/run/containerd/containerd.sock"
  uid = 0
  gid = 0
  max_recv_message_size = 16777216
  max_send_message_size = 16777216

[debug]
  address = "/run/containerd/containerd-debug.sock"
  uid = 0
  gid = 0
  level = "debug"

[timeouts]
  "io.containerd.timeout.shim.cleanup" = "5s"
  "io.containerd.timeout.shim.load" = "5s"
  "io.containerd.timeout.shim.shutdown" = "3s"
  "io.containerd.timeout.task.state" = "2s"

[plugins]
  [plugins."io.containerd.grpc.v1.cri"]
    sandbox_image = "sealos.hub:5000/pause:3.9"
    max_container_log_line_size = 16384
    max_concurrent_downloads = 20
    disable_apparmor = false
    [plugins."io.containerd.grpc.v1.cri".containerd]
      snapshotter = "overlayfs"
      default_runtime_name = "runc"
      [plugins."io.containerd.grpc.v1.cri".containerd.runtimes]
        [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
          runtime_type = "io.containerd.runc.v2"
          [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]
            SystemdCgroup = true
        [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.crun]
          runtime_type = "io.containerd.runc.v2"
          [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.crun.options]
            BinaryName = "/usr/bin/crun"
            SystemdCgroup = true
        [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.kata]
          runtime_type = "io.containerd.kata.v2"
          privileged_without_host_devices = true
          [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.kata.options]
            ConfigPath = "/opt/kata/share/defaults/kata-containers/configuration-clh.toml"
    [plugins."io.containerd.grpc.v1.cri".registry]
      config_path = "/etc/containerd/certs.d"
      [plugins."io.containerd.grpc.v1.cri".registry.configs]
          [plugins."io.containerd.grpc.v1.cri".registry.configs."sealos.hub:5000".auth]
            username = "admin"
            password = "passw0rd"

  [plugins."io.containerd.snapshotter.v1.nydus"]
    root_path = "/var/lib/containerd-nydus"
    address = "/run/containerd-nydus/containerd-nydus-grpc.sock"

[proxy_plugins]
  [proxy_plugins.nydus]
    type = "snapshot"
    address = "/run/containerd-nydus/containerd-nydus-grpc.sock"
# kata-startup-latency runtime-rs handler begin
        [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.kata-clh-runtime-rs]
          runtime_type = "io.containerd.kata-clh-runtime-rs.v2"
          privileged_without_host_devices = true
          [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.kata-clh-runtime-rs.options]
            BinaryName = "/usr/local/bin/containerd-shim-kata-clh-runtime-rs-v2"
            ConfigPath = "/opt/kata/share/defaults/kata-containers/runtime-rs/configuration-cloud-hypervisor.toml"
# kata-startup-latency runtime-rs handler end
# kata-startup-latency runtime-rs tracing handler begin
        [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.kata-clh-runtime-rs-tracing]
          runtime_type = "io.containerd.kata-clh-runtime-rs-tracing.v2"
          privileged_without_host_devices = true
          [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.kata-clh-runtime-rs-tracing.options]
            BinaryName = "/usr/local/bin/containerd-shim-kata-clh-runtime-rs-tracing-v2"
            ConfigPath = "/opt/kata/share/defaults/kata-containers/runtime-rs/configuration-cloud-hypervisor-tracing.toml"
# kata-startup-latency runtime-rs tracing handler end
# kata-startup-latency runtime-rs agent tracing handler begin
        [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.kata-clh-runtime-rs-tracing-agent]
          runtime_type = "io.containerd.kata-clh-runtime-rs-tracing-agent.v2"
          privileged_without_host_devices = true
          [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.kata-clh-runtime-rs-tracing-agent.options]
            BinaryName = "/usr/local/bin/containerd-shim-kata-clh-runtime-rs-tracing-agent-v2"
            ConfigPath = "/opt/kata/share/defaults/kata-containers/runtime-rs/configuration-cloud-hypervisor-tracing-agent.toml"
# kata-startup-latency runtime-rs agent tracing handler end
